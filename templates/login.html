{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div style="max-width:340px;margin:4rem auto">
  <div class="card">
    <h1 style="text-align:center;margin-bottom:1.5rem">🎵 Tuna<br><span style="font-size:14px;font-weight:400;color:#5f5e5a">Disponibilidades</span></h1>
    <form method="post">
      <label>Password</label>
      <input type="password" name="password" autofocus style="margin-bottom:1rem">
      <button class="btn btn-primary" style="width:100%">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
