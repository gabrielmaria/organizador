<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Organizador Tunastico{% endblock %}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--card:#fff;--border:#e0dfd8;--border2:#ccc;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#9a9890;
  --blue:#185fa5;--blue-bg:#e6f1fb;
  --green:#27500a;--green-bg:#eaf3de;--green-border:#3b6d11;
  --red:#791f1f;--red-bg:#fcebeb;--red-border:#a32d2d;
  --amber:#633806;--amber-bg:#faeeda;--amber-border:#fac775;
  --radius:10px;--radius-lg:14px;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh}
a{color:var(--blue);text-decoration:none}
nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 1rem;display:flex;align-items:center;height:54px;gap:.5rem;position:sticky;top:0;z-index:100}
.brand{font-weight:700;font-size:17px;margin-right:auto}
.nav-link{font-size:14px;color:var(--text2);padding:6px 12px;border-radius:8px;white-space:nowrap}
.nav-link:hover{background:var(--bg);color:var(--text)}
.container{max-width:640px;margin:0 auto;padding:1.25rem 1rem 3rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:.75rem}
.card-title{font-size:16px;font-weight:600;margin-bottom:1rem}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:4px}
input[type=text],input[type=password],textarea,select{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:15px;font-family:inherit;background:var(--card);color:var(--text);-webkit-appearance:none}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.12)}
textarea{min-height:100px;resize:vertical}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:var(--radius);font-size:15px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--card);color:var(--text);transition:.15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn:hover{background:var(--bg)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#0c447c}
.btn-danger{color:var(--red);border-color:#f09595}
.btn-danger:hover{background:var(--red-bg)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-full{width:100%}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:13px;font-weight:500}
.badge-sim{background:var(--green-bg);color:var(--green)}
.badge-nao{background:var(--red-bg);color:var(--red)}
.badge-talvez{background:var(--amber-bg);color:var(--amber)}
.badge-none{background:var(--bg);color:var(--text3)}
.flash{background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--radius);padding:10px 14px;margin-bottom:1rem;font-size:14px;color:var(--amber)}
.row{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap}
.spacer{flex:1}
.muted{color:var(--text2);font-size:13px}
.divider{border:none;border-top:1px solid var(--border);margin:1rem 0}
</style>
{% block head %}{% endblock %}
</head>
<body>
{% if session.auth %}
<nav>
  <span class="brand">🎵 Tuna</span>
  <a href="{{ url_for('index') }}" class="nav-link">Eventos</a>
  <a href="{{ url_for('elementos') }}" class="nav-link">Membros</a>
  <a href="{{ url_for('logout') }}" class="nav-link">Sair</a>
</nav>
{% endif %}
<div class="container">
{% for msg in get_flashed_messages() %}
<div class="flash">{{ msg }}</div>
{% endfor %}
{% block content %}{% endblock %}
</div>
</body>
</html>
