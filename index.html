{% extends "base.html" %}
{% block title %}Eventos — Tuna{% endblock %}
{% block content %}
<div class="row" style="margin-bottom:1.25rem">
  <h1 style="margin:0">Eventos</h1>
  <div class="spacer"></div>
  <a href="{{ url_for('novo_evento') }}" class="btn btn-primary">+ Novo evento</a>
</div>

{% if eventos %}
{% for ev in eventos %}
<div class="card" style="margin-bottom:.75rem">
  <div class="row">
    <div>
      <div style="font-weight:600;font-size:15px">{{ ev.nome }}</div>
      <div style="font-size:12px;color:#888780;margin-top:2px">{{ ev.criado }}</div>
    </div>
    <div class="spacer"></div>
    <a href="{{ url_for('evento', eid=ev.id) }}" class="btn btn-sm">Registar</a>
    <a href="{{ url_for('tabela', eid=ev.id) }}" class="btn btn-sm">Tabela</a>
    <form method="post" action="{{ url_for('del_evento', eid=ev.id) }}" style="display:inline" onsubmit="return confirm('Apagar evento e todas as respostas?')">
      <button class="btn btn-sm btn-danger">Apagar</button>
    </form>
  </div>
</div>
{% endfor %}
{% else %}
<div class="card" style="text-align:center;color:#888780;padding:3rem">
  Nenhum evento ainda.<br>
  <a href="{{ url_for('novo_evento') }}">Cria o primeiro</a>
</div>
{% endif %}
{% endblock %}
